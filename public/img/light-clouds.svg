<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB37C"/>
      <stop offset="50%" stop-color="#FFD19D"/>
      <stop offset="100%" stop-color="#FFEED5"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFF0D1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD19D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#skyGrad)"/>
  <!-- Sun glow -->
  <circle cx="400" cy="280" r="150" fill="url(#sun)"/>
  
  <!-- Back Clouds (Light Peach) -->
  <path d="M-50 450 Q-20 300 80 320 Q150 250 250 320 Q350 280 450 330 Q550 290 650 340 Q750 300 850 360 L850 450 Z" fill="#FFC996" opacity="0.8"/>
  
  <!-- Mid Clouds (Soft Orange) -->
  <path d="M-50 450 Q50 330 150 350 Q220 280 350 350 Q450 320 550 360 Q650 310 750 370 Q820 320 850 380 L850 450 Z" fill="#FFAA6C" opacity="0.9"/>
  
  <!-- Front Clouds (Deep Orange) -->
  <path d="M-50 450 Q80 360 200 390 Q280 340 400 390 Q500 350 620 400 Q720 360 850 410 L850 450 Z" fill="#FF8D4B"/>
  
  <!-- Floating wispy clouds -->
  <path d="M100 150 Q150 140 200 150 Q150 160 100 150 Z" fill="#FFFFFF" opacity="0.6"/>
  <path d="M600 180 Q650 170 720 180 Q650 190 600 180 Z" fill="#FFFFFF" opacity="0.5"/>
</svg>
