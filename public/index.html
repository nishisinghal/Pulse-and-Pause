<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Pulse & Pause — India's digital health ecosystem for youth. Track movement, sleep, nutrition & mood in Hindi and English.">
  <meta name="theme-color" content="#111827">
  <title>Pulse & Pause | पल्स & पॉज़</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pulse & Pause">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/pages.css">

  <!-- MUST be in <head> — capture install prompt before any JS runs -->
  <script>
    window._pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window._pwaInstallPrompt = e;
      console.log('[PWA] Install prompt captured');
    });
    window.addEventListener('appinstalled', () => {
      window._pwaInstallPrompt = null;
      console.log('[PWA] App installed');
    });
  </script>
</head>
<body>
  <!-- Header -->
  <header id="app-header" class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="/logo.svg" alt="Pulse & Pause" class="brand-logo">
        <h1 class="brand-name" data-i18n="app.name">Pulse & Pause</h1>
      </div>
      <div class="header-actions">
        <span id="header-greeting" class="header-greeting"></span>
        <button id="lang-toggle" class="lang-toggle" aria-label="Toggle Language">
          <span id="lang-label">EN</span>
        </button>
        <button id="theme-toggle" class="lang-toggle" aria-label="Toggle Theme">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="app-content" class="app-content">
    <div class="loading-screen">
      <div class="loader-ring"></div>
      <p>Loading...</p>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-item" data-page="dashboard">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n="nav.dashboard">Dashboard</span>
    </button>
    <button class="nav-item" data-page="movement">
      <span class="nav-icon">🏃</span>
      <span class="nav-label" data-i18n="nav.movement">Movement</span>
    </button>
    <button class="nav-item" data-page="sleep">
      <span class="nav-icon">😴</span>
      <span class="nav-label" data-i18n="nav.sleep">Sleep</span>
    </button>
    <button class="nav-item" data-page="nutrition">
      <span class="nav-icon">🥗</span>
      <span class="nav-label" data-i18n="nav.nutrition">Nutrition</span>
    </button>
    <button class="nav-item" id="nav-periods" data-page="periods" style="display:none;">
      <span class="nav-icon">🩸</span>
      <span class="nav-label" data-i18n="periods.title">Periods</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="/js/utils/helpers.js"></script>
  <script src="/js/utils/streaks.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/pages/auth.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/movement.js"></script>
  <script src="/js/pages/sleep.js"></script>
  <script src="/js/pages/nutrition.js"></script>
  <script src="/js/pages/mood.js"></script>
  <script src="/js/pages/periods.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/pages/events.js"></script>
  <script src="/js/pages/history.js"></script>
  <script src="/js/pages/reports.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Failed:', err));
      });
    }
  </script>
</body>
</html>
